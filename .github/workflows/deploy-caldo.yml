name: Deploy Caldo

on:
  push:
    branches: [cliente/caldo]
  workflow_dispatch:

env:
  APP_PATH: /root/simples-caldo

jobs:
  deploy-caldo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest on server
        run: |
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && git fetch origin cliente/caldo && git reset --hard origin/cliente/caldo"

      - name: Deploy Caldo
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && bash deploy.sh"
